<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Bunny Mission</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#050b25;
  color:white;
  text-align:center;
}

.screen{display:none;padding:20px}
.active{display:block}

button{
  padding:15px;
  margin:10px;
  border:none;
  border-radius:12px;
  font-size:18px;
  background:linear-gradient(#ffb6d9,#ff8fd1);
}

.card{
  background:#0b1640;
  padding:15px;
  border-radius:16px;
  margin:10px 0;
}

.ship{
  width:40%;
}

.row{display:flex;justify-content:center;gap:10px}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro" class="screen active">
<h2>Incoming Transmission</h2>
<img src="maiku_ship.png" class="ship">
<img src="mira_ship.png" class="ship">
<p>restore the connection.</p>
<button onclick="go('l1')">start mission</button>
</div>

<!-- LEVEL 1 -->
<div id="l1" class="screen">
<h2>Level 1</h2>

<div class="card" onclick="pick('A')">A: 4→6→9</div>
<div class="card" onclick="pick('B')">B: 10→14→19</div>
<div class="card" onclick="pick('C')">C: 5→7→10</div>
<div class="card" onclick="pick('D')">D: 9→13→18</div>

<p id="sel"></p>

<button onclick="checkL1()">Validate</button>
<button onclick="clearPick()">Clear</button>
<p id="msg1"></p>
</div>

<!-- LEVEL 2 -->
<div id="l2" class="screen">
<h2>Level 2</h2>
<p>3→7→12<br>4→9→15<br>5→11→18<br>6→13→?</p>
<input id="ans2">
<button onclick="checkL2()">submit</button>
<p id="msg2"></p>
</div>

<!-- LEVEL 3 -->
<div id="l3" class="screen">
<h2>Level 3</h2>

<button onclick="pick3('A')">Option A</button>
<button onclick="pick3('B')">Option B</button>
<button onclick="pick3('C')">Option C</button>

<p id="msg3"></p>
</div>

<!-- LEVEL 4 ROUTE -->
<div id="l4" class="screen">
<h2>Final Route</h2>

<button onclick="route='A'">A</button>
<button onclick="route='B'">B</button>
<button onclick="route='C'">C</button>
<button onclick="route='D'">D</button>

<button onclick="checkRoute()">confirm</button>
<p id="msg4"></p>
</div>

<!-- LOCK -->
<div id="lock" class="screen">
<h2>Final Lock</h2>
<input id="code">
<button onclick="checkCode()">unlock</button>
<p id="msg5"></p>
</div>

<!-- FINAL -->
<div id="end" class="screen">
<h2>Final Approach Complete</h2>

<div class="row">
<img src="maiku_ship.png" class="ship">
<img src="mira_ship.png" class="ship">
</div>

<p>thanks for staying on the path…</p>
<p>you found your way to me</p>
<p><i>onto the next journey</i></p>

<button onclick="alert('…i don’t mind either')">End Transmission</button>
</div>

<script>

function go(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
document.getElementById(id).classList.add('active')
beep()
}

function beep(){
let ctx=new AudioContext()
let o=ctx.createOscillator()
let g=ctx.createGain()
o.connect(g)
g.connect(ctx.destination)
o.start()
g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.2)
}

let picks=[]

function pick(x){
if(picks.length<2){picks.push(x)}
document.getElementById("sel").innerText=picks.join(" → ")
}

function clearPick(){
picks=[]
document.getElementById("sel").innerText=""
}

function checkL1(){
if(picks[0]=='C' && picks[1]=='B'){
go('l2')
}else{
document.getElementById("msg1").innerText="wrong"
}
}

function checkL2(){
if(document.getElementById("ans2").value==21){
go('l3')
}else{
document.getElementById("msg2").innerText="wrong"
}
}

function pick3(x){
if(x=='A'){
go('l4')
}else{
document.getElementById("msg3").innerText="wrong"
}
}

let route=""

function checkRoute(){
if(route=='C'){
go('lock')
}else{
document.getElementById("msg4").innerText="wrong"
}
}

function checkCode(){
if(document.getElementById("code").value==4612){
go('end')
}else{
document.getElementById("msg5").innerText="wrong"
}
}

</script>

</body>
</html>
